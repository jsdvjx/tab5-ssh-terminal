<!DOCTYPE html>
<!--
  Tab5-SSH BLE Wi-Fi provisioning client (Web Bluetooth, Chrome/Edge only).

  README / usage:
  - Web Bluetooth requires a SECURE CONTEXT: serve this file over https or
    from localhost. Easiest:  python3 -m http.server  in this directory, then
    open http://localhost:8000/ble_setup.html  (or host it on GitHub Pages).
  - Click "Connect to Tab5", pick the "Tab5-SSH" device, choose a network,
    type the password, send. Live status appears at the bottom.

  SECURITY NOTE: the link uses BLE "Just Works" pairing with no bonding —
  Wi-Fi credentials cross the air in PLAINTEXT. This is a deliberate
  personal-device tradeoff, the same as most consumer gadgets' first-run
  provisioning. Don't use it where someone may be sniffing 2.4 GHz.

  Protocol (all UUIDs share base 5a7eXXXX-91f4-4b9a-aa44-57c5b5e4d50a):
    0001 service
    0002 WIFI_SCAN   read+notify — reading triggers a scan; the JSON array
         [{"s":ssid,"r":rssi,"a":auth}] arrives chunked across notifications,
         terminated by a zero-length notification.
    0003 WIFI_CREDS  write {"s":"ssid","p":"password"} (long writes OK)
    0004 STATUS      read+notify {"st":"idle|connecting|connected|fail","ip":...}
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tab5-SSH Wi-Fi Setup</title>
<style>
  :root { color-scheme: dark; }
  body {
    margin: 0; min-height: 100vh; display: flex; justify-content: center;
    background: #14161c; color: #d8dce6;
    font: 15px/1.5 -apple-system, "Segoe UI", Roboto, sans-serif;
  }
  main { width: min(440px, 92vw); padding: 32px 0 48px; }
  h1 { font-size: 20px; font-weight: 600; margin: 0 0 4px; }
  .sub { color: #7d8494; font-size: 13px; margin-bottom: 24px; }
  button {
    background: #2f6fed; color: #fff; border: 0; border-radius: 8px;
    padding: 10px 16px; font-size: 15px; cursor: pointer;
  }
  button:disabled { background: #2a2e3a; color: #6a7080; cursor: default; }
  button.ghost { background: #232733; color: #d8dce6; }
  .row { display: flex; gap: 8px; margin: 12px 0; }
  #networks { margin: 16px 0; border-radius: 10px; overflow: hidden; }
  .net {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 14px; background: #1c1f28; cursor: pointer;
    border-bottom: 1px solid #14161c;
  }
  .net:hover { background: #232733; }
  .net.sel { background: #24304d; outline: 1px solid #2f6fed; }
  .net .meta { color: #7d8494; font-size: 12px; }
  input[type=password], input[type=text] {
    flex: 1; background: #1c1f28; color: #d8dce6; border: 1px solid #2a2e3a;
    border-radius: 8px; padding: 10px 12px; font-size: 15px;
  }
  #status {
    margin-top: 20px; padding: 12px 14px; border-radius: 8px;
    background: #1c1f28; font-family: ui-monospace, monospace; font-size: 13px;
    white-space: pre-wrap;
  }
  #status.ok { color: #6fdb8a; }
  #status.bad { color: #e8706f; }
  .hidden { display: none; }
  .warn { color: #b08a3e; font-size: 12px; margin-top: 16px; }
</style>
</head>
<body>
<main>
  <h1>Tab5-SSH Wi-Fi Setup</h1>
  <div class="sub">Provision your Tab5 over Bluetooth LE</div>

  <button id="connect">Connect to Tab5</button>

  <section id="panel" class="hidden">
    <div class="row">
      <button id="rescan" class="ghost">Rescan networks</button>
    </div>
    <div id="networks"></div>
    <div class="row">
      <input id="ssid" type="text" placeholder="SSID (or pick above)">
    </div>
    <div class="row">
      <input id="pass" type="password" placeholder="Password">
      <button id="send">Send</button>
    </div>
  </section>

  <div id="status">disconnected</div>
  <div class="warn">Credentials are sent over BLE in plaintext (Just Works
  pairing, no bonding) — fine for a personal device at home, not for hostile
  airspace. Page must be served from https or localhost.</div>
</main>

<script>
const BASE = i => `5a7e000${i}-91f4-4b9a-aa44-57c5b5e4d50a`;
const SVC = BASE(1), CH_SCAN = BASE(2), CH_CREDS = BASE(3), CH_STATUS = BASE(4);

const $ = id => document.getElementById(id);
const dec = new TextDecoder(), enc = new TextEncoder();
let creds, scanChr, statusChr, scanBuf = "";

function setStatus(text, cls) {
  $("status").textContent = text;
  $("status").className = cls || "";
}

function renderNetworks(list) {
  const box = $("networks");
  box.innerHTML = "";
  list.sort((a, b) => b.r - a.r).forEach(n => {
    const div = document.createElement("div");
    div.className = "net";
    div.innerHTML = `<span>${n.s.replace(/[<>&]/g, c =>
        ({"<":"&lt;",">":"&gt;","&":"&amp;"}[c]))}</span>
      <span class="meta">${n.r} dBm ${n.a ? "🔒" : "open"}</span>`;
    div.onclick = () => {
      box.querySelectorAll(".net").forEach(e => e.classList.remove("sel"));
      div.classList.add("sel");
      $("ssid").value = n.s;
      $("pass").focus();
    };
    box.appendChild(div);
  });
}

function onScanChunk(ev) {
  const v = ev.target.value;
  if (v.byteLength === 0) {              // zero-length notify = end marker
    try { renderNetworks(JSON.parse(scanBuf)); }
    catch (e) { console.warn("bad scan json", scanBuf); }
    scanBuf = "";
    return;
  }
  scanBuf += dec.decode(v);
}

function onStatus(ev) {
  let st;
  try { st = JSON.parse(dec.decode(ev.target.value)); } catch { return; }
  if (st.st === "connected")
    setStatus(`Wi-Fi connected${st.ip ? " — IP " + st.ip : ""} ✓`, "ok");
  else if (st.st === "fail")
    setStatus("Wi-Fi connection failed — check the password", "bad");
  else
    setStatus("Wi-Fi: " + st.st);
}

$("connect").onclick = async () => {
  if (!navigator.bluetooth) {
    setStatus("Web Bluetooth unavailable. Use Chrome/Edge over https or localhost.", "bad");
    return;
  }
  try {
    setStatus("requesting device...");
    const dev = await navigator.bluetooth.requestDevice({
      filters: [{ services: [SVC] }, { name: "Tab5-SSH" }],
      optionalServices: [SVC],
    });
    dev.addEventListener("gattserverdisconnected", () => {
      setStatus("disconnected", "bad");
      $("panel").classList.add("hidden");
      $("connect").disabled = false;
    });
    setStatus("connecting...");
    const gatt = await dev.gatt.connect();   // Chrome negotiates a large MTU
    const svc = await gatt.getPrimaryService(SVC);
    scanChr   = await svc.getCharacteristic(CH_SCAN);
    creds     = await svc.getCharacteristic(CH_CREDS);
    statusChr = await svc.getCharacteristic(CH_STATUS);

    await scanChr.startNotifications();
    scanChr.addEventListener("characteristicvaluechanged", onScanChunk);
    await statusChr.startNotifications();
    statusChr.addEventListener("characteristicvaluechanged", onStatus);

    onStatus({ target: { value: await statusChr.readValue() } });
    $("panel").classList.remove("hidden");
    $("connect").disabled = true;
    await doScan();
  } catch (e) {
    setStatus("error: " + e.message, "bad");
  }
};

async function doScan() {
  scanBuf = "";
  setStatus("scanning networks (results follow over notifications)...");
  // A read of WIFI_SCAN triggers the scan; it also returns the cached
  // (possibly stale) list, which we render immediately as a placeholder.
  const v = await scanChr.readValue();
  try { renderNetworks(JSON.parse(dec.decode(v))); } catch {}
}
$("rescan").onclick = doScan;

$("send").onclick = async () => {
  const s = $("ssid").value.trim(), p = $("pass").value;
  if (!s) { setStatus("pick a network / type an SSID first", "bad"); return; }
  try {
    setStatus("sending credentials...");
    await creds.writeValueWithResponse(enc.encode(JSON.stringify({ s, p })));
    setStatus("credentials sent — waiting for Wi-Fi...");
  } catch (e) {
    setStatus("write failed: " + e.message, "bad");
  }
};
</script>
</body>
</html>
